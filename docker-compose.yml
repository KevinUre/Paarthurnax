services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paarthurnax-backend
    expose:
      - "3000"
    volumes:
      - /backend:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: paarthurnax-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /backend/cert:/cert:ro
    restart: unless-stopped
